<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- description and author are set dynamically from profile.js via App.jsx -->
  <meta name="description" content="" />
  <meta name="author" content="" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <!-- title is set dynamically from profile.pageTitle via App.jsx -->
  <title></title>
  <!-- og: tags must be updated manually — social crawlers don't run JS -->
  <!-- update og:title and og:description to match profile.pageTitle and profile.metaDescription -->
  <meta property="og:title" content="" />
  <meta property="og:description" content="" />
  <meta property="og:url" content="%VITE_APP_URL%" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="%VITE_APP_URL%/preview.jpg" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
